<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Configurações - Alpha Insights</title>
  <style>
    :root {
      --bg: #0a192f;
      --card: #112240;
      --green: #64ffda;
      --text: #ccd6f6;
      --sub: #8892b0;
      --pink: #f75590;
      --glass: rgba(17, 34, 64, 0.7);
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      background: var(--card);
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 10px 30px -10px rgba(2, 12, 27, 0.7);
      width: 90%;
      max-width: 450px;
      border: 1px solid rgba(100, 255, 218, 0.1);
      backdrop-filter: blur(10px);
    }
    h1 {
      color: var(--green);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    p { color: var(--sub); font-size: 0.9rem; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.5rem; font-size: 0.8rem; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 1px; }
    input {
      width: 100%;
      padding: 12px;
      background: rgba(2, 12, 27, 0.7);
      border: 1px solid #233554;
      border-radius: 6px;
      color: #e6f1ff;
      font-size: 0.9rem;
      box-sizing: border-box;
      transition: all 0.3s ease;
    }
    input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 2px rgba(100, 255, 218, 0.1); }
    button {
      width: 100%;
      padding: 12px;
      background: transparent;
      color: var(--green);
      border: 1px solid var(--green);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    button:hover { background: rgba(100, 255, 218, 0.1); transform: translateY(-2px); }
    #status { margin-top: 1rem; font-size: 0.85rem; text-align: center; height: 1.2rem; }
    .success { color: var(--green); }
    .error { color: var(--pink); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Alpha Insights 📈</h1>
    <p>Configure sua chave da API do Gemini para começar.</p>
    
    <div class="input-group">
      <label for="apiKey">Chave API do Gemini</label>
      <input type="password" id="apiKey" placeholder="Cole sua chave aqui...">
    </div>
    
    <button id="save">Salvar Configurações</button>
    <div id="status"></div>
  </div>
  <script src="options.js"></script>
</body>
</html>
